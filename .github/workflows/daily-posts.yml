name: Daily automatic posts

on:
  schedule:
    # GitHub cron uses UTC. 01:00 UTC is 09:00 in China (UTC+8).
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-automatic-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Generate five daily posts
        run: python scripts/generate_daily_posts.py --count 5 --output-root .

      - name: Commit and push new posts
        shell: bash
        run: |
          if git diff --quiet -- posts/; then
            echo "No new posts to commit for today."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/
          china_date="$(TZ=Asia/Shanghai date +%F)"
          git commit -m "publish daily posts ${china_date}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
